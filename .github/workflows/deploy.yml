name: CI/CD Pipeline for Anor Market

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  # Bu yerda nomni almashtirdik
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/anor-back
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/anor-front

jobs:
  # ====================== Backend build & push
  build-backend:
    name: Build Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🐳 Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          # BU YERDA: beck -> back ga o'zgardi
          context: ./anor-back
          file: ./anor-beck/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha, mode=max

  # ====================== Frontend build & push
  build-frontend:
    name: ⚛️ Build Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🐳 Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./anor-front
          file: ./anor-front/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha, mode=max

  # ====================== Notify
  notify:
    name: 📢 Send Notification
    runs-on: ubuntu-latest
    # Bu yerda ham build-beckend emas build-backend bo'ldi
    needs: [build-backend, build-frontend]
    if: always()
    steps:
      - name: 📊 Check build status
        run: |
          if [ "${{ needs.build-backend.result }}" == "success" ] && [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "STATUS=success" >> $GITHUB_ENV
          else
            echo "STATUS=failed" >> $GITHUB_ENV
          fi

      - name: 🎉 Final Message
        if: env.STATUS == 'success'
        run: echo "🚀 CI/CD Pipeline completed successfully! Images are in Docker Hub."